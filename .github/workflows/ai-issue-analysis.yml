name: AI Issue Analysis

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Analyze issue with LLM
        uses: actions/github-script@v8
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        with:
          script: |
            const issue = context.payload.issue;

            const baseUrl = process.env.LLM_BASE_URL;
            const apiKey = process.env.LLM_API_KEY;
            let   model  = process.env.LLM_MODEL;

            if (!baseUrl || !model) {
              core.setFailed(
                'Variables requeridas no encontradas. ' +
                'LLM_BASE_URL=' + (baseUrl ? 'SET' : 'EMPTY') + ', ' +
                'LLM_MODEL=' + (model ? 'SET' : 'EMPTY') + '. ' +
                'Configuralas en Settings > Secrets and variables > Actions (repositorio).'
              );
              return;
            }

            // Strip LiteLLM-style provider prefixes (e.g. nvidia_nim/)
            // The NVIDIA NIM API expects just the model id (e.g. moonshotai/kimi-k2.6)
            model = model.replace(/^nvidia_nim\//, '');

            core.info('LLM endpoint: ' + baseUrl + '/chat/completions');
            core.info('LLM model:    ' + model);

            // Fetch existing repo labels
            const { data: repoLabels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const labelNames = new Set(repoLabels.map(l => l.name));

            // Build prompt — using array join to avoid YAML-breaking braces
            const promptLines = [
              'Analiza el siguiente issue de GitHub y responde UNICAMENTE con un JSON valido.',
              '',
              'Titulo: ' + issue.title,
              'Cuerpo: ' + (issue.body || 'Sin descripcion'),
              '',
              'Formato requerido (no incluyas markdown, solo JSON puro):',
              '{"labels": ["label1", "label2"], "diagnosis": "Analisis detallado..."}',
              '',
              'Reglas:',
              '- labels debe contener entre 1 y 3 elementos.',
              '- Usa labels descriptivos (ej: bug, feature, enhancement, refactor, documentation, question, ui, gameplay, performance).',
              '- diagnosis debe ser un analisis conciso pero completo en espanol.',
              '- El JSON debe ser valido y no contener comentarios.',
            ];
            const prompt = promptLines.join('\n');

            // Prepare headers
            const headers = { 'Content-Type': 'application/json' };
            if (apiKey) {
              headers['Authorization'] = 'Bearer ' + apiKey;
            }

            // Call LLM with retry for rate limits (429)
            let response;
            for (let attempt = 0; attempt < 4; attempt++) {
              response = await fetch(baseUrl + '/chat/completions', {
                method: 'POST',
                headers,
                body: JSON.stringify({
                  model: model,
                  messages: [{ role: 'user', content: prompt }],
                  max_tokens: 2048,
                }),
              });

              if (response.ok) break;

              if (response.status !== 429 || attempt === 3) {
                const errText = await response.text();
                core.setFailed('LLM API error: ' + response.status + ' ' + errText);
                return;
              }

              // Exponential backoff for 429 rate limits
              const delay = Math.pow(2, attempt) * 5000;
              core.info('Rate limited (429), retrying in ' + (delay / 1000) + 's...');
              await new Promise(r => setTimeout(r, delay));
            }

            const data = await response.json();
            const rawText = data.choices?.[0]?.message?.content;
            if (!rawText) {
              core.setFailed('LLM API returned empty content.');
              return;
            }

            // Parse LLM response — try direct parse, then extract JSON object
            let result;
            try {
              result = JSON.parse(rawText);
            } catch (e) {
              const match = rawText.match(/\{[\s\S]*\}/);
              if (match) {
                result = JSON.parse(match[0]);
              } else {
                core.setFailed('No se pudo parsear la respuesta del LLM: ' + rawText);
                return;
              }
            }

            const labelsToApply = Array.isArray(result.labels)
              ? result.labels.filter(l => typeof l === 'string')
              : [];

            // Create labels that don't exist yet
            for (const label of labelsToApply) {
              if (!labelNames.has(label)) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: 'ededed',
                  });
                  labelNames.add(label);
                } catch (e) {
                  core.warning('Could not create label ' + label + ': ' + e.message);
                }
              }
            }

            // Apply labels
            if (labelsToApply.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToApply,
              });
            }

            // Post diagnosis comment
            if (result.diagnosis) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '## \u{1F916} Diagnóstico de IA\n\n' + result.diagnosis,
              });
            }
